<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukulele Friends - Song Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        if (localStorage.getItem("uke_authenticated") !== "true") {
            window.location.href = "index.html";
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('login_search_background.png') no-repeat center top fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Positions menu container precisely 10px below the hanging sign bounds */
        .main-menu-laptop {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding-top: 34vh; 
            padding-bottom: 20px;
            width: 100%;
        }

        .menu-item {
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: transparent;
            padding: 0;
        }

        /* Forces button text onto one line by setting an explicit width auto scaling factor */
        .menu-item img {
            height: auto;
            width: 240px; 
            display: block;
        }

        .menu-item img.normal { display: block; }
        .menu-item img.glow { display: none; }
        .menu-item.active img.normal { display: none; }
        .menu-item.active img.glow { display: block; }

        .search-container {
            width: 92%;
            max-width: 1150px;
            background: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        .search-instructions {
            font-size: 16px;
            color: #333;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: left;
        }

        .search-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .search-box {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #cc5200;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Custom UI Search Submission Action Button */
        .search-submit-btn {
            padding: 0 30px;
            background: #e65c00;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-submit-btn:hover {
            background: #cc5200;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            background: #e65c00;
            color: white;
            padding: 12px;
            font-weight: 600;
            text-align: left;
            font-size: 15px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #333;
            font-size: 14px;
            height: 22px;
        }
        tr.placeholder-row td {
            color: #ddd;
        }
    </style>
</head>
<body>

<nav class="main-menu-laptop">
    <a href="search.html" class="menu-item active">
        <img src="button_search.png" alt="Song Search" class="normal">
        <img src="button_glow_search.png" alt="Song Search (Highlighted)" class="glow">
    </a>
    <a href="videos.html" class="menu-item">
        <img src="button_videos.png" alt="Open Mic Videos" class="normal">
        <img src="button_glow_videos.png" alt="Open Mic Videos (Highlighted)" class="glow">
    </a>
</nav>

<div class="search-container">
    <div class="search-instructions">Please enter key word to search among any fields below.</div>
    
    <div class="search-row">
        <input type="text" id="searchInput" class="search-box" placeholder="Type terms here..." onkeypress="handleKeyPress(event)">
        <button class="search-submit-btn" onclick="processMultiTermSearch()">Search</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 30%;">Title</th>
                <th style="width: 25%;">Artist</th>
                <th style="width: 25%;">Album</th>
                <th style="width: 10%;">Key</th>
                <th style="width: 10%;">File Link</th>
            </tr>
        </thead>
        <tbody id="resultsTableBody">
            </tbody>
    </table>
</div>

<script>
    let songDatabase = [];

    // Renders the 10-row baseline grid framework on window load
    function initEmptyGrid() {
        const tbody = document.getElementById("resultsTableBody");
        tbody.innerHTML = "";
        for (let i = 0; i < 10; i++) {
            const tr = document.createElement("tr");
            tr.className = "placeholder-row";
            tr.innerHTML = `<td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td>`;
            tbody.appendChild(tr);
        }
    }
    window.onload = initEmptyGrid;

    // Load database safely
    Papa.parse("database.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            songDatabase = results.data;
        }
    });

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            processMultiTermSearch();
        }
    }

    // Fixed Multi-Term Matching Engine Logic
    function processMultiTermSearch() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();
        const tbody = document.getElementById("resultsTableBody");
        tbody.innerHTML = "";

        if (query === "") {
            initEmptyGrid();
            return;
        }

        // Tokenize search array terms by space delimiters
        const searchTerms = query.split(/\s+/);

        const matchedSongs = songDatabase.filter(song => {
            // Evaluates row data values across all headers combined
            const combinedRowText = Object.values(song).join(" ").toLowerCase();
            return searchTerms.every(term => combinedRowText.includes(term));
        });

        if (matchedSongs.length === 0) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="5" style="text-align:center; color:#888; font-style:italic; padding:40px;">No matching records found.</td>`;
            tbody.appendChild(tr);
        } else {
            matchedSongs.forEach(song => {
                const tr = document.createElement("tr");
                
                // Maps properties safely to fallback alternatives if fields are blank
                const title = song.Title || song.title || '';
                const artist = song.Artist || song.artist || '';
                const album = song.Album || song.album || '';
                const key = song.Key || song.key || '';
                const link = song.FileLink || song.filelink || song.Link || song.link || '';

                tr.innerHTML = `
                    <td><strong>${title}</strong></td>
                    <td>${artist}</td>
                    <td>${album}</td>
                    <td>${key}</td>
                    <td>${link ? `<a href="${link}" target="_blank" style="color:#e65c00; font-weight:bold; text-decoration:none;">Open File</a>` : '--'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    }
</script>

</body>
</html>

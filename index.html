<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukulele Song Database - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5af19, #e65c00);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        h2 {
            margin-bottom: 24px;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #e65c00;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #cd5200;
        }
        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        
        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #ccc;
            color: #555;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        .google-btn:hover {
            background: #f7f7f7;
        }
        .google-btn img {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Ukulele Gateway</h2>
    
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="divider">or</div>

    <button id="googleLoginBtn" class="google-btn">
        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google Logo">
        Sign in with Google
    </button>
</div>

<script>
    // --- 1. Standard Form Submission Handler ---
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
        event.preventDefault();
        
        const usernameInput = document.getElementById("username").value.trim();
        const passwordInput = document.getElementById("password").value.trim();

        // Combine inputs to protect both values simultaneously
        const combinedString = usernameInput + ":" + passwordInput;

        // Scramble the combined credentials using SHA-256
        const encoder = new TextEncoder();
        const data = encoder.encode(combinedString);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashedCredentials = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

        // Secret target hash matching username 'ukulele' and password 'friends'
        const targetHash = "78b456e343b679b38031e411b426615b3c5825bc5e7ee065b79e9da28800ff8a";

        if (hashedCredentials === targetHash) {
            localStorage.setItem("uke_authenticated", "true");
            window.location.href = "search.html"; // Safe redirect to the search screen
        } else {
            alert("Invalid username or password!");
        }
    });

    // --- 2. Google Login Mock Button Handler ---
    document.getElementById("googleLoginBtn").addEventListener("click", function() {
        // Since we are running a secure static site without full Firebase overhead,
        // clicking this bypasses the lock out screen and routes you straight in.
        localStorage.setItem("uke_authenticated", "true");
        window.location.href = "search.html";
    });
</script>

</body>
</html>

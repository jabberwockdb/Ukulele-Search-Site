<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukulele Song Database - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('sunset.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        h2 { margin-bottom: 24px; color: #333; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #666; font-size: 14px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        .login-btn {
            width: 100%; padding: 12px; background: #e65c00; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s;
        }
        .login-btn:disabled { background: #cccccc; cursor: not-allowed; }
        #cooldownMsg { color: #d9534f; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Ukulele Gateway</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" id="submitBtn" class="login-btn">Sign In</button>
        <div id="cooldownMsg">Too many attempts. Please wait 3 seconds...</div>
    </form>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        const cooldownMsg = document.getElementById("cooldownMsg");
        
        const userValue = document.getElementById("username").value.trim().toLowerCase();
        const passValue = document.getElementById("password").value.trim().toLowerCase();

        const encodedUser = btoa(userValue);
        const encodedPass = btoa(passValue);

        const uTarget = "dWt1bGVsZQ==";
        const pTarget = "ZnJpZW5kcw==";

        if (encodedUser === uTarget && encodedPass === pTarget) {
            localStorage.setItem("uke_authenticated", "true");
            window.location.href = "search.html";
        } else {
            alert("Invalid username or password!");
            
            submitBtn.disabled = true;
            cooldownMsg.style.display = "block";
            
            setTimeout(() => {
                submitBtn.disabled = false;
                cooldownMsg.style.display = "none";
            }, 3000);
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukulele Friends - Mobile Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), url('mobile_login_background.png') no-repeat center top fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-padding-space {
            width: 100%;
            height: 32vh; /* Slightly lower threshold tailored perfectly to the portrait sign dimensions */
        }
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligns toward top half of the portrait beach zone */
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.96);
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 340px;
            box-sizing: border-box;
            text-align: center;
        }
        .input-group { margin-bottom: 16px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #444; font-size: 14px; font-weight: 600; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px;
            -webkit-appearance: none; /* Disables default iOS inner shadow styling */
        }
        .login-btn {
            width: 100%; padding: 12px; background: #e65c00; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .login-btn:disabled { background: #cccccc; }
        #cooldownMsg { color: #d9534f; font-size: 14px; margin-top: 12px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-padding-space"></div>

<div class="main-content">
    <div class="login-container">
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="off" autocapitalize="none">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" id="submitBtn" class="login-btn">Sign In</button>
            <div id="cooldownMsg">Too many attempts. Please wait <span id="countdown">5</span> seconds...</div>
        </form>
    </div>
</div>

<script>
    // 💻 Reverse Laptop Redirection Check (If someone expands a desktop window)
    if (window.innerWidth > 768 && !/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = "index.html";
    }

    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        const cooldownMsg = document.getElementById("cooldownMsg");
        const countdownSpan = document.getElementById("countdown");
        
        const userValue = document.getElementById("username").value.trim().toLowerCase();
        const passValue = document.getElementById("password").value.trim().toLowerCase();

        if (btoa(userValue) === "dWt1bGVsZQ==" && btoa(passValue) === "ZnJpZW5kcw==") {
            localStorage.setItem("uke_authenticated", "true");
            window.location.href = "search.html";
        } else {
            alert("Invalid username or password!");
            submitBtn.disabled = true;
            cooldownMsg.style.display = "block";
            let timeLeft = 5;
            countdownSpan.innerText = timeLeft;
            
            const timer = setInterval(() => {
                timeLeft--;
                countdownSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    submitBtn.disabled = false;
                    cooldownMsg.style.display = "none";
                }
            }, 1000);
        }
    });
</script>
</body>
</html>
